<!doctype html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GSplat Compare — 3D Gaussian Splatting Viewer</title>
  <meta name="description" content="Compare 3D Gaussian Splatting models side-by-side with synchronized cameras. Drag scenes onto panels to compare rendering quality metrics.">
  <link href="/src/style.css" rel="stylesheet">
</head>

<body>
  <div id="app">

    <!-- ── Header Bar ──────────────────────────────────────────────────────── -->
    <header id="header-bar">
      <div class="header-logo">
        <svg class="logo-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="16" cy="16" r="6" fill="#FF8C42" opacity="0.9"/>
          <circle cx="8"  cy="10" r="3.5" fill="#FF8C42" opacity="0.5"/>
          <circle cx="24" cy="10" r="3.5" fill="#FF8C42" opacity="0.5"/>
          <circle cx="8"  cy="22" r="3.5" fill="#FF8C42" opacity="0.4"/>
          <circle cx="24" cy="22" r="3.5" fill="#FF8C42" opacity="0.4"/>
          <circle cx="16" cy="5"  r="2.5" fill="#FF8C42" opacity="0.35"/>
          <circle cx="16" cy="27" r="2.5" fill="#FF8C42" opacity="0.35"/>
        </svg>
        <span class="logo-text">GSplat <span class="logo-accent">Compare</span></span>
      </div>

      <div class="header-controls">
        <div class="sync-control">
          <span class="sync-label">Sync Cameras</span>
          <button id="sync-toggle" class="toggle-btn" role="switch" aria-checked="true" title="Toggle camera synchronization">
            <span class="toggle-thumb"></span>
          </button>
        </div>
        <div class="fps-display">
          <span class="fps-label">FPS</span>
          <span id="fps-counter" class="fps-value">--</span>
        </div>
      </div>
    </header>

    <!-- ── Main Content ────────────────────────────────────────────────────── -->
    <div id="main-content">

      <!-- Canvas Area -->
      <div id="canvas-area">
        <!-- Panel slots injected by JS -->
        <div id="panel-grid"></div>

        <!-- Layout Toolbar -->
        <div id="layout-toolbar">
          <button class="layout-btn" id="layout-single" data-layout="single" title="Single panel">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
            </svg>
          </button>
          <button class="layout-btn active" id="layout-split" data-layout="split" title="Vertical split (2 panels)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="8" height="18" rx="2"/>
              <rect x="13" y="3" width="8" height="18" rx="2"/>
            </svg>
          </button>
          <button class="layout-btn" id="layout-quad" data-layout="quad" title="Quad grid (4 panels)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3"  y="3"  width="8" height="8"  rx="1.5"/>
              <rect x="13" y="3"  width="8" height="8"  rx="1.5"/>
              <rect x="3"  y="13" width="8" height="8"  rx="1.5"/>
              <rect x="13" y="13" width="8" height="8"  rx="1.5"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Right Sidebar -->
      <aside id="scene-sidebar">
        <div class="sidebar-header">
          <h2 class="sidebar-title">SCENES</h2>
          <span class="sidebar-hint">Drag onto a panel</span>
        </div>
        <div id="scene-list">
          <!-- Scene cards injected by JS -->
        </div>
      </aside>

    </div><!-- /main-content -->
  </div><!-- /app -->

  <script type="module" src="/src/main.js"></script>
</body>

</html>
